name: Vaultwarden
services:
  Vaultwarden:
    container_name: Vaultwarden
    image: vaultwarden/server:1.35.6@sha256:93072633c6b125628419097fc951d1ce448422a1af1d653805520a8ba90f6956
    restart: unless-stopped
    networks:
      - Vaultwarden
    environment:
      - DOMAIN=${DOMAIN}
      - SIGNUPS_ALLOWED=false # Deactivate this with "false" after you have created your account so that no strangers can register (Although ideally you wouldn't expose your Vaultwarden instance to the outside world anyways)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_TIMEOUT=${SMTP_TIMEOUT}
      - SMTP_SECURITY=${SMTP_SECURITY}
      - SMTP_PORT=${SMTP_PORT}
      - IP_HEADER=X-Forwarded-For # Trust the IP header from the reverse proxy
      - SENDS_ALLOWED=false # Deactivate sends -- My vault is only accessible on my home network so sends are not useful because others cannot access them.
    volumes:
      - ${DOCKER_VOLUMES}/Vaultwarden:/data/
      - /etc/localtime:/etc/localtime:ro

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
          pids: 50

networks:
  Vaultwarden:
    name: Vaultwarden
    external: true
